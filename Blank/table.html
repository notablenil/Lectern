<!DOCTYPE html>
<html>
<head>
    <title>Offset Table</title>
</head>
<body style="background-color: #FFFFFF">
    <a href="home.html">Return</a>
    <div>
        <label for="fileInput"> Upload .txt file for the table</label>
        <input type="file" id="fileInput" accept="txt" />
    </div>
    <div>
        <label for="countInput"> Enter how many items you want to select (default 20) </label>
        <input type="text" id="countInput" />
    </div>
    <div>
        <label for="indexInput"> Enter what offset you would like (default 0) </label>
        <input type="text" id="indexInput" />
        <label for="indexValue"> Enter how much offset the button should add (default 3) </label>
        <input type="text" id="indexValue" />
        <label for="indexButton"> Press me to add to the index!</label>
        <input type="button" id="indexButton" />
    </div>

    <table id="targetContent">
        <thread>
            <tr>
                <th> Roll </th>
                <th> Value </th>
            </tr>
        </thread>
        <tbody id="targetBody"></tbody>
    </table>

    <script src="OffsetTable.js"></script>

</body>
</html>
